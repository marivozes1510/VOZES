<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vozes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap');
  :root{
    --bg:#0f0d14;--bg2:#17131f;--gold:#d9b673;--gold-soft:#b89a5e;
    --text:#ece6dd;--text-dim:#9a9088;--card:#1c1825;--card-hover:#241f30;--line:#2e2738;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(circle at 50% 0%, #1d1726 0%, var(--bg) 55%);color:var(--text);font-family:'Jost',sans-serif;min-height:100vh;padding:40px 20px 80px;line-height:1.6;}
  .wrap{max-width:680px;margin:0 auto}
  header{text-align:center;margin-bottom:48px}
  .title{font-family:'Cormorant Garamond',serif;font-size:54px;font-weight:500;letter-spacing:2px;color:var(--gold);margin-bottom:10px;}
  .sub{font-size:15px;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase;font-weight:300;}
  .step-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:var(--gold-soft);margin:0 0 18px 4px;}
  .voices{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:40px;}
  .voice{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px 18px;cursor:pointer;transition:all .25s ease;text-align:center;}
  .voice:hover{background:var(--card-hover);transform:translateY(-2px)}
  .voice.active{border-color:var(--gold);background:var(--card-hover);box-shadow:0 0 0 1px var(--gold), 0 8px 30px rgba(217,182,115,.12);}
  .voice .icon{font-size:30px;display:block;margin-bottom:10px}
  .voice .name{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--text);font-weight:500;}
  .ask{margin-bottom:30px}
  textarea{width:100%;background:var(--card);border:1px solid var(--line);border-radius:14px;color:var(--text);font-family:'Jost',sans-serif;font-size:17px;padding:18px 20px;resize:vertical;min-height:90px;transition:border .2s;}
  textarea:focus{outline:none;border-color:var(--gold-soft)}
  textarea::placeholder{color:var(--text-dim)}
  .btn{margin-top:16px;width:100%;background:linear-gradient(180deg,var(--gold) 0%,var(--gold-soft) 100%);color:#1a1510;border:none;border-radius:14px;font-family:'Jost',sans-serif;font-size:16px;font-weight:500;letter-spacing:2px;text-transform:uppercase;padding:17px;cursor:pointer;transition:opacity .2s,transform .1s;}
  .btn:hover{opacity:.92}
  .btn:active{transform:scale(.99)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .answer{margin-top:36px;background:linear-gradient(180deg,var(--bg2),#13101a);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:14px;padding:30px 32px;font-family:'Cormorant Garamond',serif;font-size:23px;line-height:1.65;color:#f2ece1;white-space:pre-wrap;display:none;animation:fade .8s ease;}
  .answer.show{display:block}
  .answer .who{display:block;font-family:'Jost',sans-serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-soft);margin-bottom:16px;}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .loading{text-align:center;color:var(--text-dim);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:20px;margin-top:36px;display:none;}
  .loading.show{display:block}
  .hint{font-size:13px;color:var(--text-dim);margin-top:8px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">Vozes</div>
    <div class="sub">Escolha quem você precisa ouvir hoje</div>
  </header>
  <div class="step-label">Escolha uma voz</div>
  <div class="voices" id="voices"></div>
  <div class="ask">
    <div class="step-label">O que está no seu coração?</div>
    <textarea id="q" placeholder="Escreva aqui o que você está sentindo..."></textarea>
    <button class="btn" id="send">Receber</button>
    <div class="hint">Você pode escrever qualquer coisa — uma dúvida, um medo, uma dor.</div>
  </div>
  <div class="loading" id="loading">a voz está se aproximando...</div>
  <div class="answer" id="answer"></div>
  <button class="btn" id="novo" style="display:none;margin-top:18px;background:transparent;border:1px solid var(--gold-soft);color:var(--gold)">Nova pergunta</button>
</div>
<script>
const VOICES = [
  {id:"crista",        name:"Cristianismo",     icon:"🕊️"},
  {id:"estoicismo",    name:"Estoicismo",       icon:"🏛️"},
  {id:"budismo",       name:"Budismo",          icon:"🌿"},
  {id:"guardiao",      name:"Guardião",         icon:"✨"},
  {id:"espiritismo",   name:"Espiritismo",      icon:"🌌"},
  {id:"seuEuDoFuturo", name:"Seu Eu do Futuro", icon:"⏳"},
];
let selected = null;
const voicesEl = document.getElementById('voices');
VOICES.forEach(v=>{
  const d=document.createElement('div');
  d.className='voice';
  d.innerHTML=`<span class="icon">${v.icon}</span><span class="name">${v.name}</span>`;
  d.onclick=()=>{
    document.querySelectorAll('.voice').forEach(x=>x.classList.remove('active'));
    d.classList.add('active');
    selected=v;
  };
  voicesEl.appendChild(d);
});
const btn=document.getElementById('send');
const loading=document.getElementById('loading');
const answer=document.getElementById('answer');
const novo=document.getElementById('novo');
novo.onclick=()=>{
  answer.classList.remove('show');
  answer.innerHTML='';
  novo.style.display='none';
  document.getElementById('q').value='';
  document.querySelectorAll('.voice').forEach(x=>x.classList.remove('active'));
  selected=null;
  window.scrollTo({top:0,behavior:'smooth'});
};
btn.onclick=async()=>{
  const q=document.getElementById('q').value.trim();
  if(!selected){alert('Escolha uma voz primeiro 🙏');return;}
  if(!q){alert('Escreva o que você está sentindo.');return;}
  answer.classList.remove('show');
  novo.style.display='none';
  loading.classList.add('show');
  btn.disabled=true;
  try{
    const res=await fetch("/api/responder",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ mensagem:q, voz:selected.id })
    });
    const data=await res.json();
    loading.classList.remove('show');
    if(data.texto){
      answer.innerHTML=`<span class="who">${selected.icon} ${selected.name}</span>`+data.texto;
    }else{
      answer.innerHTML=`<span class="who">${selected.icon} ${selected.name}</span>`+(data.erro||"(sem resposta)");
    }
    answer.classList.add('show');
    novo.style.display='block';
  }catch(e){
    loading.classList.remove('show');
    answer.innerHTML=`<span class="who">erro</span>Algo deu errado ao chamar a voz. Tente de novo.`;
    answer.classList.add('show');
    novo.style.display='block';
  }finally{
    btn.disabled=false;
  }
};
</script>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script></body>
</html>
